<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Workouts - GymTrance</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="page-shell">
            <header class="hero">
                <div class="hero-copy">
                    <p class="eyebrow">Member Dashboard</p>
                    <h1>My Workouts</h1>
                    <p class="hero-text">
                        View your sessions, add new workouts, and keep your training organized.
                    </p>
                </div>
                <div class="hero-badge">
                    <span class="badge-label">Dashboard</span>
                    <strong>Active Session</strong>
                </div>
            </header>

            <main class="dashboard">
                <section class="panel content-panel">
                    <div id="message-box" class="message-box"></div>

                    <div class="content-grid">
                        <div class="workout-panel">
                            <div class="section-header">
                                <div>
                                    <p class="section-label">Dashboard</p>
                                    <h2>Your Workouts</h2>
                                </div>
                                <div class="action-row dashboard-actions">
                                    <button type="button" id="load-data-btn" class="secondary-btn">Refresh</button>
                                    <button type="button" id="logout-btn" class="ghost-btn">Logout</button>
                                </div>
                            </div>

                            <div id="workout-list" class="workout-list"></div>
                        </div>

                        <div class="panel add-panel">
                            <div class="panel-heading">
                                <h2>Add Workout</h2>
                                <p>Choose a built-in exercise or create your own custom one.</p>
                            </div>

                            <form id="add-workout-form" class="stack-form">
                                <div class="mini-box">
                                    <h3>Preset Workout</h3>
                                    <select name="preset_workout" id="preset-workout-select">
                                        <option value="">Choose a preset exercise</option>
                                        <option value="Bench Press" data-category="Strength">Bench Press</option>
                                        <option value="Deadlift" data-category="Strength">Deadlift</option>
                                        <option value="Chest Press" data-category="Strength">Chest Press</option>
                                        <option value="Squat" data-category="Strength">Squat</option>
                                        <option value="Lat Pulldown" data-category="Strength">Lat Pulldown</option>
                                        <option value="Treadmill Run" data-category="Cardio">Treadmill Run</option>
                                        <option value="Cycling" data-category="Cardio">Cycling</option>
                                        <option value="Jump Rope" data-category="Cardio">Jump Rope</option>
                                        <option value="Yoga Flow" data-category="Flexibility">Yoga Flow</option>
                                        <option value="Hamstring Stretch" data-category="Flexibility">Hamstring Stretch</option>
                                    </select>
                                    <button type="button" id="add-preset-btn" disabled>Add Preset Workout</button>
                                </div>

                                <div class="mini-box">
                                    <h3>Custom Workout</h3>
                                    <input type="text" name="custom_workout" id="custom-workout-input" placeholder="Type a custom workout">
                                    <select name="category" id="custom-category-select">
                                        <option value="">Select category</option>
                                        <option value="Strength">Strength</option>
                                        <option value="Cardio">Cardio</option>
                                        <option value="Flexibility">Flexibility</option>
                                    </select>
                                    <button type="button" id="add-custom-btn" disabled>Add Custom Workout</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </section>
            </main>
        </div>

        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    </body>
</html>
