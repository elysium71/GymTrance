<html>
    <head>
        <title>Gym App</title>
        <link rel="stylesheet" href="static/style.css">
    </head>
    <body>
        <h1>Welcome to Gym App</h1>

        <!-- registration form -->
        <div id="registration-form">
            <h2>Register</h2>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
        </div>

        <!-- login form -->
        <div id="login-form">
            <h2>Login</h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Optionally add workout display sections here -->
    </body>
</html>

<script>
    // Handle registration form submission
    document.querySelector('#register-form').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default form submission
        
        let username = document.querySelector('[name="username"]').value;
        let password = document.querySelector('[name="password"]').value;

        // Send JSON data via fetch API
        fetch('http://127.0.0.1:5000/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'  // Ensure Content-Type is JSON
            },
            body: JSON.stringify({ username, password })  // Send data as JSON
        })
        .then(response => response.json())
        .then(data => {
            console.log('Success:', data);
            alert(data.message);  // Show success message
        })
        .catch((error) => {
            console.error('Error:', error);
            alert('Error occurred during registration.');
        });
    });

    // Handle login form submission similarly
    document.querySelector('#login-form').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default form submission
        
        let username = document.querySelector('[name="username"]').value;
        let password = document.querySelector('[name="password"]').value;

        fetch('http://127.0.0.1:5000/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'  // Ensure Content-Type is JSON
            },
            body: JSON.stringify({ username, password })  // Send data as JSON
        })
        .then(response => response.json())
        .then(data => {
            console.log('Login successful:', data);
            if (data.access_token) {
                alert('Login successful! Token: ' + data.access_token);
            }
        })
        .catch((error) => {
            console.error('Error:', error);
            alert('Login failed.');
        });
    });
</script>
