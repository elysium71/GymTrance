<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GymTrance</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="page-shell">
            <header class="hero">
                <div class="hero-copy">
                    <p class="eyebrow">Workout Tracker</p>
                    <h1>GymTrance</h1>
                    <p class="hero-text">
                        Track your sessions, stay consistent, and build your own training rhythm.
                    </p>
                </div>
            </header>

            <main class="dashboard">
                <section class="panel auth-panel">
                    <div class="panel-heading">
                        <h2>Account</h2>
                        <p>Create an account or log in to enter your workout dashboard.</p>
                    </div>

                    <div class="auth-grid">
                        <div class="auth-card">
                            <h3>Register</h3>
                            <form id="register-form" class="stack-form">
                                <input type="text" name="username" placeholder="Username" required>
                                <input type="password" name="password" placeholder="Password" required>
                                <button type="submit">Register</button>
                            </form>
                        </div>

                        <div class="auth-card">
                            <h3>Login</h3>
                            <form id="login-form-element" class="stack-form">
                                <input type="text" name="username" placeholder="Username" required>
                                <input type="password" name="password" placeholder="Password" required>
                                <button type="submit">Login</button>
                            </form>
                        </div>
                    </div>

                    <div id="message-box" class="message-box"></div>
                </section>
            </main>
        </div>

        <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    </body>
</html>
